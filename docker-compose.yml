services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: advisor
      POSTGRES_DB: financial_advisor
    ports:
      # Host port 5433 avoids clashing with a native Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor -d financial_advisor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host port 6380 avoids clashing with a native Redis on 6379.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App connects as non-owner app_user (RLS enforced); migrations as owner.
      DATABASE_URL: postgres://app_user:app_user@postgres:5432/financial_advisor
      MIGRATION_DATABASE_URL: postgres://advisor:advisor@postgres:5432/financial_advisor
      REDIS_URL: redis://redis:6379
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    command: sh -c "python -m scripts.migrate && uvicorn app.main:app --host 0.0.0.0 --port 3000"

volumes:
  pgdata:
