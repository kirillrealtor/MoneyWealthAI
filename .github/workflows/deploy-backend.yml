name: Deploy backend (ECS Fargate)

# Build the API image, push to ECR, and roll the Fargate service.
# Requires repo secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY.
# Gated to manual dispatch + pushes that touch the backend so frontend-only
# changes don't redeploy the API.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/deploy-backend.yml"]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: moneywealth-backend
  ECS_CLUSTER: moneywealth
  ECS_SERVICE: moneywealth-backend
  TASK_DEF: backend/deploy/task-definition.json
  CONTAINER_NAME: backend

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Dev requirements pull in ruff/mypy/pytest (and -r requirements.txt).
      - run: pip install -r requirements-dev.txt
      # Quality gates — including the advisor safety eval floor.
      - run: ruff check app scripts
      - run: mypy app
      - run: pytest tests/test_ai_safety.py tests/test_ai_validator.py tests/evals -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image (immutable SHA tag + latest)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build --platform linux/amd64 --provenance=false \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        id: build

      - name: Render task definition with the new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS (wait for stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
