# DEPRECATED — use ECS Fargate + Aurora (see DEVOPS_HANDOFF.md).
# AWS App Runner — managed Python runtime (no ECR/Docker push needed).
# In the App Runner service, set "Source directory" to /backend so it finds this.
# App Runner injects $PORT (default 8080); the app listens on it.
# All secrets (DATABASE_URL, JWT_*, PLAID_*, STRIPE_*, GROQ_API_KEY, REDIS_URL,
# ENV=production, ALLOWED_HOSTS, WEB_APP_URL) are set as env vars / secrets in the
# App Runner console — NEVER committed.
version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  network:
    port: 8080
  env:
    - name: ENV
      value: production
