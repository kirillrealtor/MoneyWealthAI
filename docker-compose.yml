services:
  redis:
    image: redis:7-alpine
    ports:
      # Host port 6380 avoids clashing with a native Redis on 6379.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: ./backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: sqlite:////app/data/financial_advisor.db
      MIGRATION_DATABASE_URL: sqlite:////app/data/financial_advisor.db
      REDIS_URL: redis://redis:6379
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    command: sh -c "python -m scripts.migrate && uvicorn app.main:app --host 0.0.0.0 --port 3000"

volumes:
  sqlite_data:
