name: Deploy frontend (Vercel)

# Deploys the Next.js frontend to Vercel using a token — no Vercel<->GitHub App
# install required (works on a repo you only collaborate on). An admin just adds
# one repo secret: VERCEL_TOKEN. The deploy steps skip cleanly until it's set,
# so this never red-X's the branch.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-frontend.yml"]

env:
  # Project identifiers (not secrets) for the linked Vercel project.
  VERCEL_ORG_ID: team_oMIUhcFnScL2THhN5EEG8cfY
  VERCEL_PROJECT_ID: prj_fq2dcWgcdAtove6DSJ1w7az2odOo

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Gate on VERCEL_TOKEN presence
        id: gate
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy (add it in repo Settings → Secrets)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - if: steps.gate.outputs.run == 'true'
        run: npm i -g vercel@latest

      - if: steps.gate.outputs.run == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - if: steps.gate.outputs.run == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - if: steps.gate.outputs.run == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
