name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# All run-steps execute in the Python project root (monorepo layout).
defaults:
  run:
    working-directory: backend

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements-dev.txt }
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy app scripts

  tests:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: advisor
          POSTGRES_PASSWORD: advisor
          POSTGRES_DB: financial_advisor
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U advisor -d financial_advisor"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://app_user:app_user@localhost:5433/financial_advisor
      MIGRATION_DATABASE_URL: postgres://advisor:advisor@localhost:5433/financial_advisor
      REDIS_URL: redis://localhost:6380
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_chars_long_0000
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_chars_long_000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements-dev.txt }
      - run: pip install -r requirements-dev.txt
      - name: Apply migrations (creates app_user role + RLS)
        run: python -m scripts.migrate
      - name: Run tests (unit + integration)
        run: pytest

  ai-eval-gate:
    name: AI Eval Gate
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      # Skips cleanly (exit 0) when no key is present; gates at >=90% when set.
      # Dummy DATABASE_URL/REDIS_URL/JWT secrets just satisfy config validation —
      # evals use mocked tools and never open a DB/Redis connection.
      - name: Run AI evals
        env:
          DATABASE_URL: postgres://u:p@localhost:5432/db
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci_eval_access_secret_at_least_32_chars_0000
          JWT_REFRESH_SECRET: ci_eval_refresh_secret_at_least_32_chars_000
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m scripts.run_evals

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt pip-audit
      - run: pip-audit -r requirements.txt || true
